services:
  - type: web
    name: safespace-server
    env: node
    region: singapore # 👈 ADD THIS
    rootDir: server
    plan: free
    buildCommand: npm ci --omit=dev
    startCommand: npm start
    autoDeploy: true
    envVars:
      - key: CORS_ORIGIN
        value: https://safespace-client-qtia.onrender.com
      - key: CLIENT_URL
        value: https://safespace-client-qtia.onrender.com
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: REDIS_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: OPENROUTER_API_KEY
        sync: false
      - key: OPENROUTER_MODEL
        value: minimax/minimax-m2.5:free
      - key: OPENROUTER_TIMEOUT_MS
        value: 20000
      - key: OPENROUTER_RETRY_COUNT
        value: 2
      - key: OPENROUTER_RETRY_BASE_DELAY_MS
        value: 1200
      - key: RATE_LIMIT_WINDOW_MS
        value: 900000
      - key: RATE_LIMIT_MAX
        value: 1000

  - type: web
    name: safespace-client
    env: node
    region: singapore # 👈 ADD THIS
    rootDir: client
    plan: free
    buildCommand: REACT_APP_API_URL=https://safespace-server-x3um.onrender.com/api REACT_APP_SOCKET_URL=https://safespace-server-x3um.onrender.com npm install && npm run build
    startCommand: npm run serve
    autoDeploy: true
    envVars:
      - key: REACT_APP_API_URL
        value: https://safespace-server-x3um.onrender.com/api
      - key: REACT_APP_SOCKET_URL
        value: https://safespace-server.onrender.com
